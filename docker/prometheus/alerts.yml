groups:

  # ── Service availability ───────────────────────────────────────────────────
  - name: availability
    rules:
      - alert: ServiceDown
        expr: up{job=~".*-service|api-gateway"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "🔴 {{ $labels.job }} is DOWN"
          description: >
            {{ $labels.job }} (instance {{ $labels.instance }}) has been
            unreachable for more than 1 minute.
            Action: check container logs with `docker compose logs {{ $labels.job }}`.

      - alert: ServiceRestartLoop
        expr: |
          increase(process_uptime_seconds{job=~".*-service|api-gateway"}[5m]) < 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ {{ $labels.job }} appears to be restarting"
          description: "Process uptime decreased — possible crash loop."

  # ── JVM memory ────────────────────────────────────────────────────────────
  - name: jvm_memory
    rules:
      - alert: HighHeapUsage
        expr: |
          jvm_memory_used_bytes{area="heap"}
          / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ High heap usage in {{ $labels.job }}"
          description: >
            Heap is {{ $value | humanizePercentage }} full in {{ $labels.job }}.
            Consider tuning -Xmx or reviewing for memory leaks.

      - alert: CriticalHeapUsage
        expr: |
          jvm_memory_used_bytes{area="heap"}
          / jvm_memory_max_bytes{area="heap"} > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "🔴 Critical heap usage in {{ $labels.job }} — OOM imminent"
          description: >
            Heap is {{ $value | humanizePercentage }} full. Service may crash.

  # ── HTTP error rates ───────────────────────────────────────────────────────
  - name: http_errors
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (job)
          > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ High 5xx error rate in {{ $labels.job }}"
          description: >
            {{ $labels.job }} is returning {{ $value | humanizePercentage }}
            HTTP 5xx responses over the last 5 minutes.

      - alert: CriticalErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (job)
          > 0.25
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "🔴 Critical error rate in {{ $labels.job }}"
          description: "More than 25% of requests are failing."

  # ── HTTP latency (p95) ─────────────────────────────────────────────────────
  - name: http_latency
    rules:
      - alert: SlowResponses
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (job, le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ Slow p95 latency in {{ $labels.job }}"
          description: >
            95th-percentile response time is {{ $value | humanizeDuration }}.
            SLO threshold is 2 s.

  # ── Kafka consumer lag ─────────────────────────────────────────────────────
  - name: kafka
    rules:
      - alert: KafkaConsumerLag
        expr: kafka_consumer_group_lag > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ Kafka consumer lag high ({{ $labels.group }})"
          description: >
            Consumer group {{ $labels.group }} is {{ $value }} messages behind
            on topic {{ $labels.topic }}.

  # ── Database connections ───────────────────────────────────────────────────
  - name: database
    rules:
      - alert: DBConnectionPoolExhausted
        expr: |
          hikaricp_connections_active
          / hikaricp_connections_max > 0.90
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ DB connection pool nearly full in {{ $labels.job }}"
          description: >
            {{ $value | humanizePercentage }} of the HikariCP pool is in use.
            Consider increasing maximum-pool-size.

  # ── Disk space (for Docker volumes) ───────────────────────────────────────
  - name: disk
    rules:
      - alert: LowDiskSpace
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"}
          / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ Low disk space on {{ $labels.instance }}"
          description: "Less than 15% disk space remaining."

