name: Dependency Review

# Runs on every PR targeting main.
# Blocks the merge if any newly added dependency has a known CVE
# rated HIGH or CRITICAL (CVSS ≥ 7.0).
#
# Uses GitHub's built-in dependency graph — no extra tokens needed.
# This action is FREE for all repositories.

on:
  pull_request:
    branches: [main]

permissions:
  contents:      write   # write needed for gradle/actions/dependency-submission
  pull-requests: write   # needed to post the summary comment on the PR

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Submit the Gradle dependency snapshot for this exact HEAD SHA
      # BEFORE the review action runs. This fixes "No snapshots were found"
      # which happens when dependency-review.yml and ci.yml race each other —
      # both trigger on pull_request simultaneously and the ci.yml submission
      # job may not finish before the review action checks for the snapshot.
      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: corretto
          cache: gradle

      - name: Submit Gradle dependency snapshot
        uses: gradle/actions/dependency-submission@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          # Disable OpenSSF Scorecard threshold warnings.
          # All flagged packages (lz4-java, kotlin-stdlib, aspectjweaver, etc.)
          # are transitive dependencies pulled in by Spring Boot / Spring Cloud /
          # Netflix Eureka — we cannot replace or upgrade them directly.
          # Low Scorecard scores reflect absent GitHub security hygiene in those
          # upstream repos (no branch protection, etc.), not actual CVEs.
          # CVE blocking is still fully active via fail-on-severity: high above.
          min-openssf-scorecard-score: 0

