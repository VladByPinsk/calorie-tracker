name: Dependency Review

# Runs on every PR targeting main.
# Blocks the merge if any newly added dependency has a known CVE
# rated HIGH or CRITICAL (CVSS ≥ 7.0).
#
# Uses GitHub's built-in dependency graph — no extra tokens needed.
# This action is FREE for all repositories.

on:
  pull_request:
    branches: [main]

permissions:
  contents:      write   # write needed for gradle/actions/dependency-submission
  pull-requests: write   # needed to post the summary comment on the PR

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Submit the Gradle dependency snapshot for this exact HEAD SHA
      # BEFORE the review action runs. This fixes "No snapshots were found"
      # which happens when dependency-review.yml and ci.yml race each other —
      # both trigger on pull_request simultaneously and the ci.yml submission
      # job may not finish before the review action checks for the snapshot.
      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: corretto
          cache: gradle

      - name: Submit Gradle dependency snapshot
        uses: gradle/actions/dependency-submission@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

          # ── OpenSSF Scorecard ──────────────────────────────────────────────
          # All flagged packages (lz4-java, kotlin-stdlib, aspectjweaver, etc.)
          # are transitive dependencies pulled in by Spring Boot / Spring Cloud /
          # Netflix Eureka — we cannot replace or upgrade them directly.
          # Low Scorecard scores reflect absent GitHub security hygiene in those
          # upstream repos (no branch protection, etc.), not actual CVEs.
          show-openssf-scorecard: false
          warn-on-openssf-scorecard-level: 0

          # ── Known-unpatched advisories ─────────────────────────────────────
          # GHSA-mf92-479x-3373 / CVE-2026-22732
          #   "Spring Security HTTP Headers Are not Written Under Some Conditions"
          #   Affects spring-security-web 7.0.0–7.0.3 (via Spring Boot 4.0.0).
          #   TODO: remove once spring-security-web ≥ 7.0.4 ships.
          #
          # GHSA-fvh3-672c-7p6c / CVE-2026-22738
          #   "Spring AI: SpEL injection via user-supplied filter expression key"
          #   Affects spring-ai-vector-store 1.0.0–1.0.4 (fix: ≥ 1.0.5).
          #   No patched GA release available as of 2026-04-04.
          #   TODO: remove once spring-ai-bom ≥ 1.0.5 ships and we upgrade.
          #
          # GHSA-rp9g-qx29-88cp / CVE-2026-22729
          #   "JSONPath Injection in Spring AI Vector Stores FilterExpressionConverter"
          #   Affects spring-ai-vector-store 1.0.0–1.1.2 (fix: ≥ 1.1.3).
          #   No patched GA release available as of 2026-04-04.
          #   TODO: remove once spring-ai-bom ≥ 1.1.3 ships and we upgrade.
          #
          # GHSA-6v53-7c9g-w56r / CVE-2026-29062
          #   "jackson-core nesting depth bypass in UTF8DataInputJsonParser"
          #   Affects tools.jackson.core:jackson-core 3.0.x (fix: ≥ 3.1.0).
          #   Patched in build via resolutionStrategy.force + constraints to 3.1.1.
          #   Allowlisted because gradle/actions/dependency-submission reports the
          #   BOM-declared version (3.0.2) in the graph snapshot rather than the
          #   Gradle-resolved version (3.1.1). Runtime classpath IS on 3.1.1.
          #   TODO: remove once Spring Boot BOM ships jackson-core ≥ 3.1.0 directly.
          #
          # GHSA-8hfc-fq58-r658 / CVE-2026-22731
          #   "Spring Boot Authentication Bypass under Actuator Health group paths"
          #   Affects spring-boot-starter-actuator 4.0.0–4.0.2. No fix available.
          #   TODO: remove once spring-boot ≥ 4.0.3 ships and we upgrade.
          #
          # GHSA-mgvc-8q2h-5pgc / CVE-2026-22733
          #   "Spring Boot Authentication Bypass under Actuator CloudFoundry endpoints"
          #   Affects spring-boot-starter-actuator 4.0.0–4.0.3 (fix: ≥ 4.0.4).
          #   spring-boot 4.0.4 not yet available on any Maven repo.
          #   TODO: remove once spring-boot ≥ 4.0.4 ships and we upgrade.
          #
          # GHSA-3qwq-q9vm-5j42 / CVE-2026-22739
          #   "Spring Cloud Config Server Path Traversal via Profile Parameter"
          #   Affects spring-cloud-config-server 4.3.0–4.3.1 (fix: ≥ 4.3.2).
          #   spring-cloud-dependencies BOM with 4.3.2 not yet available.
          #   TODO: remove once spring-cloud-dependencies with 4.3.2 ships.
          #
          # GHSA-fwxx-wv44-7qfg / CVE-2025-41253
          #   "Spring Cloud Gateway Server EL Injection"
          #   Affects spring-cloud-gateway-server 4.3.0–4.3.1 (fix: ≥ 4.3.2).
          #   spring-cloud-dependencies BOM with 4.3.2 not yet available.
          #   TODO: remove once spring-cloud-dependencies with 4.3.2 ships.
          #
          # GHSA-vqf4-7m7x-wgfc / CVE-2025-12183
          #   "lz4-java OOB memory operations (DoS)"
          #   Transitive dep from Spring Kafka / Netflix. Fix in at.yawk.lz4:lz4-java:1.8.1
          #   (different groupId — cannot be resolved via resolutionStrategy.force).
          #   TODO: remove once Spring Boot BOM migrates to at.yawk.lz4.
          #
          # GHSA-cmp6-m4wj-q63q / CVE-2025-66566
          #   "lz4-java information leak via Java safe decompressor"
          #   No patched version available (fix expected in lz4-java 1.10.1).
          #   TODO: remove once lz4-java 1.10.1 ships and Spring Boot BOM adopts it.
          allow-ghsas: >-
            GHSA-mf92-479x-3373,
            GHSA-fvh3-672c-7p6c,
            GHSA-rp9g-qx29-88cp,
            GHSA-8hfc-fq58-r658,
            GHSA-mgvc-8q2h-5pgc,
            GHSA-3qwq-q9vm-5j42,
            GHSA-fwxx-wv44-7qfg,
            GHSA-vqf4-7m7x-wgfc,
            GHSA-cmp6-m4wj-q63q,
            GHSA-6v53-7c9g-w56r

