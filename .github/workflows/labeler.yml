name: PR Labeler

# Automatically applies labels to every PR based on:
#   1. Changed file paths       → .github/labeler.yml
#   2. PR size (lines changed)  → computed inline
#   3. Label definitions sync   → .github/labels.yml (run manually)
#
# One-time setup:
#   Run "Actions → Sync Labels → Run workflow" once to create all labels
#   defined in .github/labels.yml in this repository.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:      # "Sync Labels" can also be triggered manually

permissions:
  contents:      read
  pull-requests: write   # apply labels
  issues:        write   # create labels (sync job)

jobs:
  # ── 1. Apply path-based labels ─────────────────────────────────────────────
  label-paths:
    name: Label by changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false   # don't remove labels that no longer match

  # ── 2. Apply PR size label ─────────────────────────────────────────────────
  label-size:
    name: Label by PR size
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Compute and apply size label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions ?? 0;
            const deletions = pr.deletions ?? 0;
            const total = additions + deletions;

            let sizeLabel;
            if      (total <   10) sizeLabel = 'size: XS';
            else if (total <   50) sizeLabel = 'size: S';
            else if (total <  250) sizeLabel = 'size: M';
            else if (total < 1000) sizeLabel = 'size: L';
            else                   sizeLabel = 'size: XL';

            // Remove all existing size: labels first
            const currentLabels = pr.labels.map(l => l.name);
            const sizeLabels = ['size: XS', 'size: S', 'size: M', 'size: L', 'size: XL'];
            for (const label of sizeLabels) {
              if (currentLabels.includes(label) && label !== sizeLabel) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    issue_number: pr.number,
                    name: label,
                  });
                } catch (_) { /* label may not exist yet */ }
              }
            }

            // Add the correct size label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: pr.number,
              labels: [sizeLabel],
            });
            core.info(`Applied label: ${sizeLabel} (${total} lines changed)`);

  # ── 3. Sync label definitions (manual / one-time) ──────────────────────────
  sync-labels:
    name: Sync Labels from labels.yml
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Sync labels to GitHub
        uses: crazy-max/ghaction-github-labeler@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config-file:  .github/labels.yml
          skip-delete:  false   # removes labels not present in labels.yml
          dry-run:      false

