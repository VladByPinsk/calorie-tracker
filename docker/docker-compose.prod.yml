# docker-compose.prod.yml — Production overlay
#
# Extends docker-compose.yml with production-specific settings:
#   • Pulls pre-built GHCR images instead of building from source
#   • Sets memory/CPU resource limits on all services
#   • Disables port exposure for internal services (only nginx is public)
#   • Enables Docker restart policies
#
# Usage:
#   IMAGE_TAG=2026.04.1 docker compose \
#     -f docker/docker-compose.yml \
#     -f docker/docker-compose.prod.yml \
#     up -d
#
# In CI the IMAGE_TAG is set from the CalVer release tag automatically.

name: calorie-tracker-prod

services:

  # ── Pull pre-built images from GHCR ────────────────────────────────────────
  eureka:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-vladbyPinsk}/calorie-tracker/eureka-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports: !reset []    # internal only — not reachable outside the Compose network
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }
        reservations: { memory: 256m }

  config-server:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-vladbyPinsk}/calorie-tracker/config-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports: !reset []    # internal only
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }
        reservations: { memory: 256m }

  api-gateway:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-vladbyPinsk}/calorie-tracker/api-gateway:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports: !reset []    # exposed via nginx only — direct port must be closed in prod
    deploy:
      resources:
        limits:   { memory: 768m, cpus: '1.0' }
        reservations: { memory: 384m }

  auth-service:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-vladbyPinsk}/calorie-tracker/auth-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports: !reset []    # don't expose directly — route through api-gateway
    deploy:
      resources:
        limits:   { memory: 768m, cpus: '1.0' }
        reservations: { memory: 384m }

  user-service:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-vladbyPinsk}/calorie-tracker/user-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:   { memory: 768m, cpus: '1.0' }
        reservations: { memory: 384m }

  food-service:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-vladbyPinsk}/calorie-tracker/food-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 512m }

  diary-service:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-vladbyPinsk}/calorie-tracker/diary-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:   { memory: 768m, cpus: '1.0' }
        reservations: { memory: 384m }

  ai-service:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-vladbyPinsk}/calorie-tracker/ai-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:   { memory: 2g, cpus: '2.0' }   # AI service needs more memory
        reservations: { memory: 1g }

  analytics-service:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-vladbyPinsk}/calorie-tracker/analytics-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:   { memory: 768m, cpus: '1.0' }
        reservations: { memory: 384m }

  notification-service:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-vladbyPinsk}/calorie-tracker/notification-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }
        reservations: { memory: 256m }

  # ── Databases — no build, just resource limits + restart ──────────────────
  postgres:
    restart: unless-stopped
    ports: !reset []    # never expose DB port in production
    deploy:
      resources:
        limits:   { memory: 2g, cpus: '2.0' }
        reservations: { memory: 1g }

  redis:
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }

  zookeeper:
    restart: unless-stopped
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }

  kafka:
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:   { memory: 2g, cpus: '2.0' }
        reservations: { memory: 1g }

  minio:
    restart: unless-stopped
    ports: !reset ["9000:9000"]   # keep S3 API port, hide console
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }

  ollama:
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:   { memory: 8g, cpus: '4.0' }   # LLM needs substantial resources
        reservations: { memory: 4g }

  # ── Nginx — the only publicly reachable entry point ───────────────────────
  nginx:
    # ...existing code...

  # ── Observability — internal only in production ────────────────────────────
  # All ports are reset so these services are reachable only inside the
  # Compose network. Access Grafana/Prometheus through nginx or an SSH tunnel.
  zipkin:
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }

  prometheus:
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }

  alertmanager:
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.25' }

  grafana:
    restart: unless-stopped
    ports: !reset []    # serve via nginx reverse proxy in prod
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }

  node-exporter:
    restart: unless-stopped
    ports: !reset []    # scraped by Prometheus internally; no public exposure needed
    deploy:
      resources:
        limits:   { memory: 128m, cpus: '0.1' }
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro      # TLS certs (Let's Encrypt or self-signed)
      - /var/www/html:/usr/share/nginx/html:ro  # React build output
    depends_on:
      api-gateway:
        condition: service_started
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.5' }

