global:
  scrape_interval:     15s
  evaluation_interval: 15s

# ── Alerting rules ─────────────────────────────────────────────────────────────
rule_files:
  - "alerts.yml"

# ── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'auth-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'user-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['user-service:8082']

  - job_name: 'food-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['food-service:8083']

  - job_name: 'diary-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['diary-service:8084']

  - job_name: 'ai-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['ai-service:8085']

  - job_name: 'analytics-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['analytics-service:8086']

  - job_name: 'notification-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['notification-service:8087']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
