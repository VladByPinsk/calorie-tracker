name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/vladbyPinsk/calorie-tracker

jobs:

  # ─── Lint & Test: Java services ────────────────────────────────────────────
  test-services:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - food-service
          - diary-service
          - ai-service
          - analytics-service
          - notification-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: corretto
          cache: gradle

      - name: Run tests
        run: ./gradlew :services:${{ matrix.service }}:test

      - name: Build JAR
        run: ./gradlew :services:${{ matrix.service }}:bootJar

  # ─── Lint & Test: Web frontend ─────────────────────────────────────────────
  test-web:
    name: Test Web (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test -- --watchAll=false --passWithNoTests
      - run: npm run build

  # ─── Lint: Mobile (Expo) ────────────────────────────────────────────────────
  test-mobile:
    name: Test Mobile (Expo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx expo export --platform web

  # ─── Docker Build & Push (only on main) ────────────────────────────────────
  docker-push:
    name: Docker Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test-services]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - food-service
          - diary-service
          - ai-service
          - analytics-service
          - notification-service
          - api-gateway
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: corretto
          cache: gradle

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push with Jib
        run: ./gradlew :services:${{ matrix.service }}:jib
          -Djib.to.auth.username=${{ github.actor }}
          -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

  # ─── Infrastructure services (eureka + config-server) ──────────────────────
  test-infrastructure:
    name: Test Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: corretto
          cache: gradle

      - run: ./gradlew :infrastructure:eureka-server:bootJar
      - run: ./gradlew :infrastructure:config-server:bootJar
