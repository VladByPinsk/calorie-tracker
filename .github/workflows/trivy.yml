name: Trivy Security Scan

# Scans two surfaces on every PR and push:
#   1. Filesystem / source tree (SCA — finds vulnerable dependencies in
#      pom.xml, package.json, gradle lockfiles, Dockerfiles, etc.)
#   2. All built Docker images (scans the actual container layer stack)
#
# Results are uploaded as SARIF to the GitHub Security → Code scanning tab.
# CRITICAL and HIGH vulnerabilities block the PR (via required check).
# FREE — Trivy is open-source and the GitHub Action is free to use.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-scan main every Sunday night — catches new CVEs in existing images
    - cron: '0 3 * * 0'

permissions:
  contents:      read
  security-events: write   # upload SARIF to GitHub Security tab

jobs:
  # ── 1. Scan the source tree and declared dependencies ─────────────────────
  scan-filesystem:
    name: Trivy — Filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type:  fs
          scan-ref:   .
          format:     sarif
          output:     trivy-fs.sarif
          severity:   CRITICAL,HIGH
          # Ignore unfixed vulnerabilities — they can't be actioned yet
          ignore-unfixed: true
          # Scan SCA targets: OS packages, language deps, IaC files
          scanners:   vuln,secret,misconfig

      - name: Upload filesystem scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file:   trivy-fs.sarif
          category:     trivy-filesystem

  # ── 2. Build and scan every service Docker image ──────────────────────────
  scan-images:
    name: Trivy — Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: scan-filesystem
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - food-service
          - diary-service
          - ai-service
          - analytics-service
          - notification-service
          - api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: corretto
          cache: gradle

      - name: Build Docker image with Jib (local daemon)
        run: |
          ./gradlew :services:${{ matrix.service }}:jibDockerBuild \
            -Djib.to.image=calorie-tracker/${{ matrix.service }}:scan

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type:  image
          image-ref:  calorie-tracker/${{ matrix.service }}:scan
          format:     sarif
          output:     trivy-image-${{ matrix.service }}.sarif
          severity:   CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload image scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-${{ matrix.service }}.sarif
          category:   trivy-image-${{ matrix.service }}

