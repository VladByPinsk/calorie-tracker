global:
  # Default SMTP settings — override per receiver if needed.
  smtp_smarthost:   '${ALERTMANAGER_SMTP_HOST:-smtp.gmail.com:587}'
  smtp_from:        '${ALERTMANAGER_SMTP_FROM:-alerts@your-domain.com}'
  smtp_auth_username: '${ALERTMANAGER_SMTP_USERNAME}'
  smtp_auth_password: '${ALERTMANAGER_SMTP_PASSWORD}'
  smtp_require_tls: true

  # How long to wait before re-sending a firing alert.
  resolve_timeout: 5m

# ── Routing tree ─────────────────────────────────────────────────────────────
# critical → email + Slack immediately
# warning  → Slack only (batched every 5 min)
route:
  receiver: 'default'
  group_by: ['alertname', 'job', 'severity']
  group_wait:      30s    # wait before sending the first notification in a group
  group_interval:  5m     # wait before sending a notification for new alerts
  repeat_interval: 4h     # re-send if still firing

  routes:
    - match:
        severity: critical
      receiver: critical
      continue: true   # also send to default (Slack) if desired

    - match:
        severity: warning
      receiver: warning

# ── Receivers ─────────────────────────────────────────────────────────────────
receivers:

  - name: 'default'
    slack_configs:
      - api_url: '${ALERTMANAGER_SLACK_WEBHOOK_URL}'
        channel:  '${ALERTMANAGER_SLACK_CHANNEL:-#alerts}'
        title:    '{{ template "slack.title" . }}'
        text:     '{{ template "slack.text" . }}'
        send_resolved: true

  - name: 'critical'
    email_configs:
      - to:            '${ALERTMANAGER_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }} — {{ .GroupLabels.job }}'
    slack_configs:
      - api_url: '${ALERTMANAGER_SLACK_WEBHOOK_URL}'
        channel:  '${ALERTMANAGER_SLACK_CHANNEL:-#alerts}'
        title:    '🔴 CRITICAL: {{ template "slack.title" . }}'
        text:     '{{ template "slack.text" . }}'
        send_resolved: true

  - name: 'warning'
    slack_configs:
      - api_url: '${ALERTMANAGER_SLACK_WEBHOOK_URL}'
        channel:  '${ALERTMANAGER_SLACK_CHANNEL:-#alerts}'
        title:    '⚠️ WARNING: {{ template "slack.title" . }}'
        text:     '{{ template "slack.text" . }}'
        send_resolved: true

# ── Inhibition rules ─────────────────────────────────────────────────────────
# Suppress warnings when a critical alert is already firing for the same job.
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'job']

# ── Notification templates ────────────────────────────────────────────────────
templates:
  - '/etc/alertmanager/templates/*.tmpl'

