spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      routes:
      - id: auth-service
        uri: lb://auth-service
        predicates:
          - Path=/api/v1/auth/**
        filters:
          - StripPrefix=0
      - id: user-service
        uri: lb://user-service
        predicates:
          - Path=/api/v1/user/**
        filters:
          - StripPrefix=0
      - id: food-service
        uri: lb://food-service
        predicates:
          - Path=/api/v1/food/**
        filters:
          - StripPrefix=0
      - id: diary-service
        uri: lb://diary-service
        predicates:
          - Path=/api/v1/diary/**
        filters:
          - StripPrefix=0
      - id: ai-service
        uri: lb://ai-service
        predicates:
          - Path=/api/v1/ai/**
        filters:
          - StripPrefix=0
      - id: analytics-service
        uri: lb://analytics-service
        predicates:
          - Path=/api/v1/analytics/**
        filters:
          - StripPrefix=0
      - id: notification-service
        uri: lb://notification-service
        predicates:
          - Path=/api/v1/notification/**
        filters:
          - StripPrefix=0
  data:
    redis.host: localhost

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints.web.exposure.include: health,info,prometheus,metrics
  tracing.sampling.probability: 1.0
  zipkin.tracing.endpoint: http://localhost:9411/api/v2/spans
