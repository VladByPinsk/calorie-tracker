name: Release

# release-please by Google automates the full release lifecycle:
#   1. Watches conventional commits on main (feat, fix, chore!, etc.)
#   2. Opens a "Release PR" that bumps versions + writes CHANGELOG.md
#   3. When you merge the Release PR it creates a GitHub Release + git tag
#
# Conventional commit → version bump mapping:
#   feat:          minor  (1.0.0 → 1.1.0)
#   fix:           patch  (1.0.0 → 1.0.1)
#   feat!: / BREAKING CHANGE:  major  (1.0.0 → 2.0.0)
#   chore/docs/refactor/test:  no bump (collected in CHANGELOG only)

on:
  push:
    branches: [main]

permissions:
  contents:      write   # create tags and releases
  pull-requests: write   # open/update the Release PR

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      # Expose whether a release was actually created so downstream jobs
      # (e.g. push release-tagged images) can gate on it.
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # Treats the repo as a Java/multi-module project.
          # Bumps version in build.gradle.kts and generates CHANGELOG.md.
          release-type: java
          # Use the default GITHUB_TOKEN — no PAT needed.
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── When a release IS created: push release-tagged Docker images ──────────
  docker-release:
    name: Push release image — ${{ matrix.service }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - food-service
          - diary-service
          - ai-service
          - analytics-service
          - notification-service
          - api-gateway

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 26
        uses: actions/setup-java@v5
        with:
          java-version: '26'
          distribution: corretto
          cache: gradle

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push versioned image with Jib
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          ./gradlew :services:${{ matrix.service }}:jib \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }} \
            -Djib.to.tags=${TAG},latest

