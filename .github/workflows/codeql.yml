name: CodeQL Security Analysis

# FREE for all public repositories — part of GitHub Advanced Security.
# Scans Java, TypeScript and JavaScript for security vulnerabilities
# and code quality issues using CodeQL's security-and-quality query suite.
#
# Results appear in:
#   Repository → Security → Code scanning alerts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Full weekly scan every Monday at 02:00 UTC (catches new CVEs in existing code)
    - cron: '0 2 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF results to GitHub Security tab
      actions:  read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual   # we drive the build ourselves for multi-module Gradle
          - language: javascript-typescript
            build-mode: autobuild

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java: provision the JDK the project requires ───────────────────────
      - name: Set up Java 26
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: corretto
          cache: gradle

      # ── Initialise CodeQL database ─────────────────────────────────────────
      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality = security queries + additional quality checks
          queries: security-and-quality

      # ── Build (Java only — CodeQL must see compilation) ────────────────────
      - name: Build Java services for CodeQL
        if: matrix.language == 'java-kotlin'
        run: |
          # Compile every service so CodeQL captures the full call graph.
          # We skip tests here — CodeQL only needs class files, not test results.
          ./gradlew --no-daemon compileJava compileTestJava \
            -x test -x checkstyleMain -x checkstyleTest

      # ── JavaScript/TypeScript: let CodeQL auto-build ───────────────────────
      - name: AutoBuild (JS/TS)
        if: matrix.language == 'javascript-typescript'
        uses: github/codeql-action/autobuild@v3

      # ── Run analysis and upload SARIF to GitHub Security tab ──────────────
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
          # Upload results even if some queries time out
          upload: always

