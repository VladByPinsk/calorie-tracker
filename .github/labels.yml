# Label definitions — managed by crazy-max/ghaction-github-labeler.
# Run "Actions → Sync Labels" to create/update/delete labels in the repo.
# Colors are hex without the leading #.

# ── Type ──────────────────────────────────────────────────────────────────────
- name: "type: feature"
  color: "0075ca"
  description: "New feature or user-facing capability"

- name: "type: bug"
  color: "d73a4a"
  description: "Something isn't working correctly"

- name: "type: breaking-change"
  color: "b60205"
  description: "Introduces a breaking API, schema, or contract change"

- name: "type: refactor"
  color: "f4b942"
  description: "Code restructure without behaviour change"

- name: "type: devops"
  color: "1a7f37"
  description: "CI/CD pipeline, Docker Compose, Gradle, or infra config"

- name: "type: docs"
  color: "8b949e"
  description: "Documentation-only change (README, spec, ADR)"

- name: "type: security"
  color: "e05c00"
  description: "Security fix, CVE patch, or hardening measure"

- name: "type: dependencies"
  color: "5319e7"
  description: "Dependency version bump (Dependabot or manual)"

- name: "type: test"
  color: "006b75"
  description: "Unit, integration, or E2E tests added or updated"

# ── Service ───────────────────────────────────────────────────────────────────
- name: "service: api-gateway"
  color: "1d4ed8"
  description: "Spring Cloud Gateway — routing, JWT validation, rate limiting (port 8080)"

- name: "service: auth-service"
  color: "7c3aed"
  description: "Registration, login, JWT issuance, MFA, OAuth2 (port 8081)"

- name: "service: user-service"
  color: "0891b2"
  description: "User profile, goals, TDEE calculation, weight log (port 8082)"

- name: "service: food-service"
  color: "16a34a"
  description: "Food database, barcode lookup, pgvector semantic search (port 8083)"

- name: "service: diary-service"
  color: "ca8a04"
  description: "Daily food diary, meal entries, water intake tracking (port 8084)"

- name: "service: ai-service"
  color: "dc2626"
  description: "Ollama RAG pipeline, photo recognition, NL parsing (port 8085)"

- name: "service: analytics-service"
  color: "9333ea"
  description: "Calorie trends, streaks, macro analysis (port 8086)"

- name: "service: notification-service"
  color: "db2777"
  description: "Push notifications, email delivery, SSE (port 8087)"

- name: "service: infrastructure"
  color: "475569"
  description: "Eureka service registry and Spring Cloud Config Server"

# ── Layer ─────────────────────────────────────────────────────────────────────
- name: "layer: backend"
  color: "a8d5b5"
  description: "Java / Spring Boot service layer"

- name: "layer: frontend"
  color: "fde68a"
  description: "React 19 web app (web/)"

- name: "layer: mobile"
  color: "c4b5fd"
  description: "React Native / Expo iOS-first app (mobile/)"

- name: "layer: infra"
  color: "93c5fd"
  description: "Docker, GitHub Actions, CI/CD, cloud infra"

# ── Domain ────────────────────────────────────────────────────────────────────
- name: "domain: database"
  color: "f87171"
  description: "Flyway migration, schema change, or index update"

- name: "domain: kafka"
  color: "fb923c"
  description: "Kafka topic, producer, consumer, or event schema"

- name: "domain: ai"
  color: "a78bfa"
  description: "Ollama models, pgvector embeddings, RAG pipeline"

- name: "domain: i18n"
  color: "6ee7b7"
  description: "Internationalisation — en/ru locale keys (i18next)"

- name: "domain: auth"
  color: "fca5a5"
  description: "Authentication, authorisation, JWT, or OAuth2 flow"

# ── Size (set automatically by the labeler) ───────────────────────────────────
- name: "size: XS"
  color: "3cbf00"
  description: "Tiny change — fewer than 10 lines"

- name: "size: S"
  color: "5d9801"
  description: "Small change — 10 to 49 lines"

- name: "size: M"
  color: "b8860b"
  description: "Medium change — 50 to 249 lines"

- name: "size: L"
  color: "d97706"
  description: "Large change — 250 to 999 lines"

- name: "size: XL"
  color: "c2410c"
  description: "Extra-large — 1000+ lines; consider splitting into smaller PRs"

# ── State ─────────────────────────────────────────────────────────────────────
- name: "state: needs-review"
  color: "0ea5e9"
  description: "PR is ready and waiting for a code review"

- name: "state: changes-requested"
  color: "f97316"
  description: "Reviewer has requested changes before approval"

- name: "state: approved"
  color: "22c55e"
  description: "All reviewers approved — ready to merge"

- name: "state: blocked"
  color: "991b1b"
  description: "Blocked by another PR, issue, or external dependency"

- name: "state: wip"
  color: "94a3b8"
  description: "Work in progress — do not review or merge yet"

- name: "state: stale"
  color: "e2e8f0"
  description: "No activity for 30 days — will be closed soon"

- name: "state: closed-stale"
  color: "cbd5e1"
  description: "Closed automatically due to inactivity"
