name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/vladbyPinsk/calorie-tracker

jobs:

  # ─── Detect which layer changed ───────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      java:   ${{ steps.filter.outputs.java }}
      web:    ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            java:
              - 'services/**'
              - 'infrastructure/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
              - '.github/workflows/ci.yml'
            web:
              - 'web/**'
              - '.github/workflows/ci.yml'
            mobile:
              - 'mobile/**'
              - '.github/workflows/ci.yml'

  # ─── Lint & Test: Java services ────────────────────────────────────────────
  test-services:
    name: Test ${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.java == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - food-service
          - diary-service
          - ai-service
          - analytics-service
          - notification-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: corretto
          cache: gradle

      - name: Run tests
        run: ./gradlew :services:${{ matrix.service }}:test

      - name: Build JAR
        run: ./gradlew :services:${{ matrix.service }}:bootJar

  # ─── Lint & Test: Web frontend ─────────────────────────────────────────────
  test-web:
    name: Test Web (React)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build

  # ─── Lint & Test: Mobile (Expo) ─────────────────────────────────────────────
  test-mobile:
    name: Test Mobile (Expo)
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install
      - run: npm run lint
      - run: npx expo export --platform web

  # ─── Docker Build & Push (only on main) ────────────────────────────────────
  docker-push:
    name: Docker Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [changes, test-services]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.changes.outputs.java == 'true'
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - food-service
          - diary-service
          - ai-service
          - analytics-service
          - notification-service
          - api-gateway
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: corretto
          cache: gradle

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push with Jib
        run: ./gradlew :services:${{ matrix.service }}:jib
          -Djib.to.auth.username=${{ github.actor }}
          -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

  # ─── Infrastructure services (eureka + config-server) ──────────────────────
  test-infrastructure:
    name: Test Infrastructure
    needs: changes
    if: needs.changes.outputs.java == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: corretto
          cache: gradle

      - run: ./gradlew :infrastructure:eureka-server:bootJar
      - run: ./gradlew :infrastructure:config-server:bootJar

  # ─── Aggregator: single required status check for branch protection ────────
  # Skipped jobs count as success here — avoids "missing required check" blocks
  # when path filtering skips web/mobile/java jobs on unrelated changes.
  ci-success:
    name: CI
    needs: [test-services, test-web, test-mobile, test-infrastructure]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed or were skipped
        run: |
          results=(
            "${{ needs.test-services.result }}"
            "${{ needs.test-web.result }}"
            "${{ needs.test-mobile.result }}"
            "${{ needs.test-infrastructure.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "❌ A required job failed or was cancelled (result: $r)"
              exit 1
            fi
          done
          echo "✅ All jobs passed or were skipped"

