name: Trivy Security Scan

# Scans the source tree on every PR and push:
#   SCA — finds vulnerable dependencies in build.gradle.kts, package.json,
#          Dockerfiles, IaC files; also scans for hardcoded secrets.
#
# Trivy CLI is downloaded directly from the pinned GitHub release tarball —
# NO GitHub Action dependency, so the GHSA-69fq-xp46-6x23 supply-chain
# advisory against aquasecurity/trivy-action cannot affect this workflow.
#
# Results are uploaded as SARIF to Security → Code scanning alerts.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 0'   # re-scan main every Sunday — catches new CVEs

permissions:
  contents:        read
  security-events: write   # upload SARIF to GitHub Security tab

env:
  # Pin Trivy to a specific release. Bump here to upgrade.
  TRIVY_VERSION: "0.69.3"

jobs:
  scan-filesystem:
    name: Trivy — Filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Trivy ${{ env.TRIVY_VERSION }}
        run: |
          curl -sLo /tmp/trivy.tar.gz \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          trivy --version

      - name: Run Trivy filesystem scan
        run: |
          trivy fs . \
            --format  sarif \
            --output  trivy-fs.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --scanners vuln,secret,misconfig \
            --exit-code 0

      - name: Upload scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category:   trivy-filesystem
